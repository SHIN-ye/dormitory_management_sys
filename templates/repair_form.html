{% extends "base.html" %}

{% block content %}
<h1>新增报修</h1>
<div class="form-box">
    <form method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label>学生</label>
            <select name="student_id" required class="form-control">
                <option value="">-- 请选择 --</option>
                {% for s in students %}
                <option value="{{ s.id }}">{{ s.sno }} {{ s.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>房间</label>
            <select name="room_id" required class="form-control">
                <option value="">-- 请选择 --</option>
                {% for r in rooms %}
                <option value="{{ r.id }}">{{ r.building.name }} {{ r.room_number }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>报修描述</label>
            <textarea name="description" required class="form-control" rows="3" placeholder="请描述需要维修的内容"></textarea>
        </div>
        <div class="form-group">
            <label>现场照片/视频</label>
            <input type="file" name="image" accept="image/*,video/*" class="form-control">
            <small style="color:#999;">支持图片和视频，不超过16MB</small>
        </div>
        <div class="form-group">
            <label>报修日期</label>
            <input type="date" name="report_date" required class="form-control">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{{ url_for('repair_list') }}" class="btn">取消</a>
        </div>
    </form>
</div>
{% endblock %}
