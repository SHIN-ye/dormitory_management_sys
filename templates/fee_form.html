{% extends "base.html" %}

{% block content %}
<h1>新增费用</h1>
<div class="form-box">
    <form method="post">
        <div class="form-group">
            <label>学生</label>
            <select name="student_id" required class="form-control">
                <option value="">-- 请选择 --</option>
                {% for s in students %}
                <option value="{{ s.id }}">{{ s.sno }} {{ s.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>房间</label>
            <select name="room_id" required class="form-control">
                <option value="">-- 请选择 --</option>
                {% for r in rooms %}
                <option value="{{ r.id }}">{{ r.building.name }} {{ r.room_number }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>费用类型</label>
            <select name="fee_type" required class="form-control">
                <option value="住宿费">住宿费</option>
                <option value="水电费">水电费</option>
                <option value="维修费">维修费</option>
            </select>
        </div>
        <div class="form-group">
            <label>金额（元）</label>
            <input type="number" step="0.01" name="amount" min="0.01" required class="form-control">
        </div>
        <div class="form-group">
            <label>截止日期</label>
            <input type="date" name="due_date" class="form-control">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{{ url_for('services.fee_list') }}" class="btn">取消</a>
        </div>
    </form>
</div>
{% endblock %}
