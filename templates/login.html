{% extends "base.html" %}

{% block fullpage %}
<div class="login-wrapper">
    <div class="login-card">
        <h1>🏢 学生公寓管理系统</h1>
        <form method="post">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required class="form-control" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required class="form-control" placeholder="请输入密码">
            </div>
            <button type="submit" class="btn btn-primary btn-block">登 录</button>
        </form>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}" style="margin-top:12px;">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>
</div>
{% endblock %}
