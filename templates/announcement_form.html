{% extends "base.html" %}

{% block content %}
<h1>{% if announcement %}编辑公告{% else %}发布公告{% endif %}</h1>
<div class="form-box">
    <form method="post">
        <div class="form-group">
            <label>标题</label>
            <input type="text" name="title" value="{{ announcement.title if announcement else '' }}" required class="form-control">
        </div>
        <div class="form-group">
            <label>内容</label>
            <textarea name="content" required class="form-control" rows="6" placeholder="请输入公告内容">{{ announcement.content if announcement else '' }}</textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{{ url_for('main.announcement_list') }}" class="btn">取消</a>
        </div>
    </form>
</div>
{% endblock %}
