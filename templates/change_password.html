{% extends "base.html" %}

{% block content %}
<h1>修改密码</h1>
<div class="form-box">
    <form method="post">
        <div class="form-group">
            <label>原密码</label>
            <input type="password" name="old_password" required class="form-control" autocomplete="current-password">
        </div>
        <div class="form-group">
            <label>新密码</label>
            <input type="password" name="new_password" required class="form-control" minlength="4" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label>确认新密码</label>
            <input type="password" name="confirm_password" required class="form-control" minlength="4" autocomplete="new-password">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">修改密码</button>
            <a href="{{ url_for('index') }}" class="btn">取消</a>
        </div>
    </form>
</div>
{% endblock %}
