{% extends "base.html" %}

{% block content %}
<h1>{% if room %}编辑房间{% else %}添加房间{% endif %}</h1>
<div class="form-box">
    <form method="post">
        <div class="form-group">
            <label>宿舍楼</label>
            <select name="building_id" required class="form-control">
                <option value="">-- 请选择 --</option>
                {% for b in buildings %}
                <option value="{{ b.id }}" {% if room and room.building_id == b.id %}selected{% endif %}>{{ b.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>房间号</label>
            <input type="text" name="room_number" value="{{ room.room_number if room else '' }}" required class="form-control">
        </div>
        <div class="form-group">
            <label>类型</label>
            <select name="room_type" class="form-control">
                <option value="单人间" {% if room and room.room_type == '单人间' %}selected{% endif %}>单人间</option>
                <option value="双人间" {% if room and room.room_type == '双人间' %}selected{% endif %}>双人间</option>
                <option value="四人间" {% if room and room.room_type == '四人间' %}selected{% endif %}>四人间</option>
                <option value="六人间" {% if room and room.room_type == '六人间' %}selected{% endif %}>六人间</option>
            </select>
        </div>
        <div class="form-group">
            <label>容量（床位数）</label>
            <input type="number" name="capacity" value="{{ room.capacity if room else 4 }}" min="1" class="form-control">
        </div>
        <div class="form-group">
            <label>已住人数</label>
            <input type="number" name="occupied" value="{{ room.occupied if room else 0 }}" min="0" class="form-control">
        </div>
        <div class="form-group">
            <label>价格（元/年）</label>
            <input type="number" step="0.01" name="price" value="{{ room.price if room else 1200.0 }}" min="0" class="form-control">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{{ url_for('room_list') }}" class="btn">取消</a>
        </div>
    </form>
</div>
{% endblock %}
