{% extends "base.html" %}

{% block content %}
<h1>编辑房间 — {{ room.building.name }} {{ room.room_number }}</h1>
<div class="form-box">
    <form method="post">
        <p class="form-info">
            <strong>宿舍楼：</strong>{{ room.building.name }} &nbsp;|&nbsp;
            <strong>房间号：</strong>{{ room.room_number }} &nbsp;|&nbsp;
            <strong>已住人数：</strong>{{ room.occupied }} / {{ room.capacity }}
        </p>
        <div class="form-group">
            <label>类型</label>
            <select name="room_type" class="form-control">
                <option value="单人间" {% if room.room_type == '单人间' %}selected{% endif %}>单人间</option>
                <option value="双人间" {% if room.room_type == '双人间' %}selected{% endif %}>双人间</option>
                <option value="四人间" {% if room.room_type == '四人间' %}selected{% endif %}>四人间</option>
                <option value="六人间" {% if room.room_type == '六人间' %}selected{% endif %}>六人间</option>
            </select>
        </div>
        <div class="form-group">
            <label>容量（床位数）</label>
            <input type="number" name="capacity" value="{{ room.capacity }}" min="{{ room.occupied }}" class="form-control">
            <small>容量不能小于当前已住人数（{{ room.occupied }}）</small>
        </div>
        <div class="form-group">
            <label>价格（元/年）</label>
            <input type="number" step="0.01" name="price" value="{{ room.price }}" min="0" class="form-control">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{{ url_for('buildings.room_list') }}" class="btn">取消</a>
        </div>
    </form>
</div>
{% endblock %}
